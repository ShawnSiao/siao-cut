<!--
  SiaoCut Creator Beta main-flow prototype
  Source context: designs/siaocut-workbench (previous prototype) and apps/desktop.
  Assumptions: Windows desktop, single talking-head source, local-first processing.
  Design reasoning: one visible job at a time, transcript as the primary surface,
  one mutually exclusive drawer, and advanced tools outside the default path.
-->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SiaoCut · Creator Beta 主流程</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" data-screen-label="SiaoCut Creator Beta 主流程">
      <aside class="rail" aria-label="项目与就绪状态">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">S</span>
          <div><strong>SiaoCut</strong><small>Creator Beta</small></div>
        </div>

        <button class="import-button" id="importButton" type="button">
          <span aria-hidden="true">＋</span>
          <span data-i18n="importButton">导入素材</span>
        </button>

        <nav class="project-nav" aria-label="项目">
          <p class="nav-label" data-i18n="projects">项目</p>
          <button class="project-item active" type="button">
            <span class="project-dot live" aria-hidden="true"></span>
            <span><strong data-i18n="projectCurrent">发布口播</strong><small data-i18n="projectDraft">草稿 · 刚刚保存</small></span>
          </button>
          <button class="project-item" type="button">
            <span class="project-dot" aria-hidden="true"></span>
            <span><strong data-i18n="projectSecond">五月复盘</strong><small data-i18n="projectReview">待审阅</small></span>
          </button>
        </nav>

        <section class="readiness-card" aria-labelledby="readinessTitle">
          <header>
            <p class="nav-label" id="readinessTitle" data-i18n="deviceReady">本机就绪</p>
            <span class="ready-count">3/4</span>
          </header>
          <ul>
            <li><span class="check-dot ok"></span><span data-i18n="coreReady">编辑核心</span><small data-i18n="available">可用</small></li>
            <li><span class="check-dot ok"></span><span>FFmpeg</span><small data-i18n="available">可用</small></li>
            <li><span class="check-dot ok"></span><span data-i18n="transcribeReady">本机转写</span><small>CPU</small></li>
            <li><span class="check-dot optional"></span><span>Codex</span><small data-i18n="optional">可选</small></li>
          </ul>
          <button class="text-button" id="advancedButton" type="button" data-i18n="advancedSettings">高级设置</button>
        </section>

        <div class="rail-footer">
          <label>
            <span data-i18n="language">界面语言</span>
            <select id="localeSelect" aria-label="界面语言">
              <option value="zh">简体中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <p><span class="privacy-dot"></span><span data-i18n="privacy">素材只保存在本机</span></p>
        </div>
      </aside>

      <section class="workbench">
        <header class="topbar">
          <div class="project-heading">
            <p class="eyebrow" data-i18n="projectType">单源口播 · 本地项目</p>
            <div class="title-row">
              <h1 data-i18n="projectCurrent">发布口播</h1>
              <span class="save-state" id="saveState" data-i18n="saved">已保存</span>
            </div>
          </div>
          <div class="top-actions">
            <button class="top-button" id="undoButton" type="button" data-i18n-title="undo" aria-label="撤销">↶</button>
            <button class="top-button" id="moreButton" type="button" data-i18n-title="more" aria-label="更多">•••</button>
            <button class="primary-action" id="primaryAction" type="button">开始处理</button>
          </div>
        </header>

        <ol class="flow-steps" id="flowSteps" aria-label="项目流程"></ol>

        <div class="workspace-grid">
          <section class="main-surface" id="mainSurface" data-screen-label="文稿主工作区"></section>
          <aside class="drawer" id="drawer" data-screen-label="单一任务抽屉"></aside>
        </div>
      </section>
    </main>

    <div class="prototype-switcher" role="group" aria-label="原型状态">
      <span data-i18n="prototypeState">原型状态</span>
      <button type="button" data-view="setup" data-i18n="stateSetup">首次导入</button>
      <button type="button" data-view="review" data-i18n="stateReview">文稿审阅</button>
      <button type="button" data-view="export" data-i18n="stateExport">导出检查</button>
    </div>

    <dialog id="advancedDialog">
      <form method="dialog" class="dialog-card">
        <header>
          <div><p class="eyebrow" data-i18n="advancedSettings">高级设置</p><h2 data-i18n="advancedTitle">需要时再配置</h2></div>
          <button class="icon-button" value="cancel" aria-label="关闭">×</button>
        </header>
        <p class="dialog-copy" data-i18n="advancedCopy">默认流程只使用 CPU 转写。以下能力保留，但不占用首次使用界面。</p>
        <div class="advanced-list">
          <button type="button"><span><strong>MOSS</strong><small data-i18n="mossCopy">多人说话人转写</small></span><b data-i18n="notConfigured">未配置</b></button>
          <button type="button"><span><strong data-i18n="speakerAnalysis">说话人分析</strong><small data-i18n="speakerCopy">匿名说话人复核</small></span><b data-i18n="onDemand">按需</b></button>
          <button type="button"><span><strong data-i18n="audioAnalysis">音频分析</strong><small data-i18n="audioCopy">响度、静音和削波</small></span><b data-i18n="onDemand">按需</b></button>
          <button type="button"><span><strong data-i18n="manualAgent">手工 Agent 交接</strong><small data-i18n="manualAgentCopy">Codex 不可用时使用</small></span><b data-i18n="available">可用</b></button>
        </div>
        <button class="secondary-action full" value="cancel" data-i18n="done">完成</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
