name: Verify and promote Windows release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing prerelease tag to verify and promote
        required: true
        type: string

permissions:
  contents: write
  attestations: read

concurrency:
  group: promote-windows-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  verify-and-promote:
    runs-on: windows-latest
    steps:
      - name: Verify prerelease assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use the stable vMAJOR.MINOR.PATCH format."
          }
          $release = gh release view $env:RELEASE_TAG --json tagName,isDraft,isPrerelease | ConvertFrom-Json
          if ($release.tagName -ne $env:RELEASE_TAG) { throw "GitHub returned the wrong release tag." }
          if ($release.isDraft) { throw "Draft releases cannot be promoted." }
          if (-not $release.isPrerelease) { throw "Release is not a prerelease." }

          $download = Join-Path $env:RUNNER_TEMP "siaocut-release-$env:RELEASE_TAG"
          New-Item -ItemType Directory -Path $download | Out-Null
          gh release download $env:RELEASE_TAG --dir $download
          if ($LASTEXITCODE -ne 0) { throw "Failed to download prerelease assets." }

          $assets = @(Get-ChildItem -LiteralPath $download -File)
          if ($assets.Count -ne 7) { throw "Expected exactly seven prerelease assets." }
          $installers = @(Get-ChildItem -LiteralPath $download -Filter '*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected exactly one NSIS installer." }
          $installer = $installers[0]
          $signature = Get-Item -LiteralPath ($installer.FullName + '.sig') -ErrorAction Stop
          $manifestPath = Get-Item -LiteralPath (Join-Path $download 'latest.json') -ErrorAction Stop
          $sbomPath = @(Get-ChildItem -LiteralPath $download -Filter '*.sbom.spdx.json')
          if ($sbomPath.Count -ne 1) { throw "Expected exactly one SPDX SBOM." }
          $checksumsPath = Get-Item -LiteralPath (Join-Path $download 'SHA256SUMS') -ErrorAction Stop
          $provenancePath = Get-Item -LiteralPath (Join-Path $download 'provenance.sigstore.json') -ErrorAction Stop
          $sbomAttestationPath = Get-Item -LiteralPath (Join-Path $download 'sbom-attestation.sigstore.json') -ErrorAction Stop

          $sbom = Get-Content -Raw $sbomPath[0] | ConvertFrom-Json
          if ($sbom.spdxVersion -notmatch '^SPDX-') { throw "SBOM does not contain a valid SPDX version." }
          foreach ($bundlePath in @($provenancePath, $sbomAttestationPath)) {
            $bundle = Get-Content -Raw $bundlePath | ConvertFrom-Json
            if (-not $bundle.mediaType -or -not $bundle.verificationMaterial) {
              throw "$($bundlePath.Name) is not a valid Sigstore bundle."
            }
          }

          $expectedChecksums = @{}
          foreach ($line in Get-Content -LiteralPath $checksumsPath) {
            if ($line -notmatch '^([0-9a-f]{64}) \*(.+)$') {
              throw "SHA256SUMS contains an invalid line: $line"
            }
            $expectedChecksums[$Matches[2]] = $Matches[1]
          }
          foreach ($subject in @($installer, $signature, $manifestPath, $sbomPath[0])) {
            if (-not $expectedChecksums.ContainsKey($subject.Name)) {
              throw "SHA256SUMS does not contain $($subject.Name)."
            }
            $actual = (Get-FileHash -LiteralPath $subject.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($expectedChecksums[$subject.Name] -ne $actual) {
              throw "SHA-256 does not match for $($subject.Name)."
            }
          }
          if ($expectedChecksums.Count -ne 4) { throw "SHA256SUMS must contain exactly four entries." }

          gh attestation verify $installer.FullName --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw "GitHub provenance verification failed." }

          $authenticode = Get-AuthenticodeSignature -LiteralPath $installer.FullName
          if ($authenticode.Status -ne 'Valid') {
            throw "Installer Authenticode status is $($authenticode.Status)."
          }

          $manifest = Get-Content -Raw $manifestPath | ConvertFrom-Json
          $entry = $manifest.platforms.'windows-x86_64-nsis'
          if (-not $entry) { throw "latest.json does not contain windows-x86_64-nsis." }
          $version = $env:RELEASE_TAG.Substring(1)
          if ($manifest.version -ne $version) { throw "Manifest version does not match the release tag." }
          if ([long]$entry.size -ne $installer.Length) { throw "Manifest size does not match the installer." }
          $sha256 = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($entry.sha256 -ne $sha256) { throw "Manifest SHA-256 does not match the installer." }
          if ($entry.signature -ne ([IO.File]::ReadAllText($signature.FullName).Trim())) {
            throw "Manifest Tauri signature does not match the detached signature."
          }
          $expectedUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/$($installer.Name)"
          if ($entry.url -ne $expectedUrl) { throw "Manifest download URL does not match the release asset." }

      - name: Promote verified release to Latest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release edit $env:RELEASE_TAG --prerelease=false --latest
