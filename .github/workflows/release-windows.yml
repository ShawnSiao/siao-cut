name: Build signed Windows prerelease

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify tag and application version
        shell: pwsh
        run: |
          $version = (Get-Content -Raw apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match application version v$version."
          }

      - name: Install build dependencies
        shell: pwsh
        run: |
          rustup update stable
          npm ci --prefix apps/desktop

      - name: Import Authenticode certificate
        id: certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'siaocut-release.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
          Remove-Item -LiteralPath $certificatePath -Force

      - name: Build and verify signed update
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          $privateKeyPath = Join-Path $env:RUNNER_TEMP 'siaocut-updater.key'
          $publicKeyPath = Join-Path $env:RUNNER_TEMP 'siaocut-updater.key.pub'
          try {
            [IO.File]::WriteAllText($privateKeyPath, $env:TAURI_SIGNING_PRIVATE_KEY, [Text.UTF8Encoding]::new($false))
            [IO.File]::WriteAllText($publicKeyPath, $env:TAURI_SIGNING_PUBLIC_KEY, [Text.UTF8Encoding]::new($false))
            $releaseBase = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME"
            powershell -NoProfile -ExecutionPolicy Bypass -File tools/build-signed-release.ps1 `
              -CertificateThumbprint '${{ steps.certificate.outputs.thumbprint }}' `
              -UpdaterPrivateKeyPath $privateKeyPath `
              -UpdaterPublicKeyPath $publicKeyPath `
              -UpdateEndpoint "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/latest.json" `
              -DownloadBaseUrl $releaseBase `
              -ReleaseNotes "SiaoCut $env:GITHUB_REF_NAME"
            if ($LASTEXITCODE -ne 0) { throw "Signed release build failed with exit code $LASTEXITCODE." }
          } finally {
            Remove-Item -LiteralPath $privateKeyPath, $publicKeyPath -Force -ErrorAction SilentlyContinue
          }

      - name: Locate release assets
        id: assets
        shell: pwsh
        run: |
          $bundle = (Resolve-Path apps/desktop/src-tauri/target/release/bundle/nsis).Path
          $installers = @(Get-ChildItem -LiteralPath $bundle -Filter '*-setup.exe')
          if ($installers.Count -ne 1) { throw "Expected exactly one signed NSIS installer." }
          $installer = $installers[0]
          $signature = Get-Item -LiteralPath ($installer.FullName + '.sig') -ErrorAction Stop
          $manifest = Get-Item -LiteralPath (Join-Path $bundle 'latest.json') -ErrorAction Stop
          $sbom = Join-Path $bundle "siaocut-$env:GITHUB_REF_NAME.sbom.spdx.json"
          $checksums = Join-Path $bundle 'SHA256SUMS'
          "bundle=$bundle" >> $env:GITHUB_OUTPUT
          "installer=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "signature=$($signature.FullName)" >> $env:GITHUB_OUTPUT
          "manifest=$($manifest.FullName)" >> $env:GITHUB_OUTPUT
          "sbom=$sbom" >> $env:GITHUB_OUTPUT
          "checksums=$checksums" >> $env:GITHUB_OUTPUT

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          path: .
          format: spdx-json
          output-file: ${{ steps.assets.outputs.sbom }}
          upload-artifact: false
          upload-release-assets: false

      - name: Generate release checksums
        shell: pwsh
        run: |
          $subjects = @(
            '${{ steps.assets.outputs.installer }}',
            '${{ steps.assets.outputs.signature }}',
            '${{ steps.assets.outputs.manifest }}',
            '${{ steps.assets.outputs.sbom }}'
          )
          $lines = foreach ($subject in $subjects) {
            $file = Get-Item -LiteralPath $subject -ErrorAction Stop
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash *$($file.Name)"
          }
          [IO.File]::WriteAllLines(
            '${{ steps.assets.outputs.checksums }}',
            $lines,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Attest release provenance
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ${{ steps.assets.outputs.checksums }}

      - name: Attest installer SBOM
        id: sbom-attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.assets.outputs.installer }}
          sbom-path: ${{ steps.assets.outputs.sbom }}

      - name: Stage attestation bundles
        id: attestations
        shell: pwsh
        run: |
          $provenance = Join-Path '${{ steps.assets.outputs.bundle }}' 'provenance.sigstore.json'
          $sbomAttestation = Join-Path '${{ steps.assets.outputs.bundle }}' 'sbom-attestation.sigstore.json'
          Copy-Item -LiteralPath '${{ steps.provenance.outputs.bundle-path }}' -Destination $provenance
          Copy-Item -LiteralPath '${{ steps.sbom-attestation.outputs.bundle-path }}' -Destination $sbomAttestation
          "provenance=$provenance" >> $env:GITHUB_OUTPUT
          "sbom=$sbomAttestation" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            '${{ steps.assets.outputs.installer }}' `
            '${{ steps.assets.outputs.signature }}' `
            '${{ steps.assets.outputs.manifest }}' `
            '${{ steps.assets.outputs.sbom }}' `
            '${{ steps.assets.outputs.checksums }}' `
            '${{ steps.attestations.outputs.provenance }}' `
            '${{ steps.attestations.outputs.sbom }}' `
            --verify-tag --prerelease --generate-notes --title "SiaoCut $env:GITHUB_REF_NAME"

      - name: Remove imported certificate
        if: always() && steps.certificate.outputs.thumbprint != ''
        shell: pwsh
        run: Remove-Item -LiteralPath 'Cert:\CurrentUser\My\${{ steps.certificate.outputs.thumbprint }}' -Force -ErrorAction SilentlyContinue
