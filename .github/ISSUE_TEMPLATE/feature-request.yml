name: 功能建议
description: 提议新的用户能力或现有流程改进
title: "feat: "
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 说明当前流程中的具体限制，以及受影响的使用方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望的交互、输入、输出和能力边界。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 说明已经尝试或可以接受的替代方法。
  - type: textarea
    id: privacy
    attributes:
      label: 隐私与本地优先影响
      description: 说明是否新增网络请求、外部服务、模型下载或媒体访问。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 已搜索现有 Issue 和文档，没有找到相同建议。
          required: true
        - label: 建议没有把尚未实现的能力描述为现有功能。
          required: true
